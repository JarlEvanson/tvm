[workspace]
resolver = "2"
members = [
    "loader/loader",
    "loader/architectures/x86_64",
    "loader/systems/x86_64-uefi",
]

[workspace.package]
authors = [ "Jarl Evanson <evanson.jarl@gmail.com>" ]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/JarlEvanson/tvm"

[workspace.dependencies]
loader = { path = "loader/loader" }

loader-x86_64 = { path = "loader/architectures/x86_64" }

[workspace.lints.rust]
# Safety lints
unsafe_op_in_unsafe_fn = "deny"

# Documentation lints
missing_docs = "warn"

[workspace.lints.clippy]
# Safety lints
undocumented_unsafe_blocks = "deny"
multiple_unsafe_ops_per_block = "deny"

# Documentation lints
missing_safety_doc = "deny"
missing_errors_doc = "warn"
missing_panics_doc = "warn"
missing_docs_in_private_items = "warn"

[profile.release]
overflow-checks = true
